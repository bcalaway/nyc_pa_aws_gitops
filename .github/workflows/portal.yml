name: Portal

on:
  push:
    branches:
      - main
    paths:
      - 'portal/**'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.10.5"
  PORTAL_BUCKET: home-platform-portal-147856894209

jobs:
  deploy:
    name: Deploy Portal
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::147856894209:role/home-platform-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync portal to S3
        run: aws s3 sync portal/ "s3://${{ env.PORTAL_BUCKET }}" --delete

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Get CloudFront distribution ID
        id: cf
        working-directory: terraform/aws
        run: |
          terraform init -input=false
          echo "id=$(terraform output -raw portal_cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id "${{ steps.cf.outputs.id }}" --paths "/*"

all:
  children:
    nucs:
      hosts:
        nuc5:
          ansible_host: 10.0.2.10
          site: rambles
        nuc4:
          ansible_host: 10.0.1.34
          site: nyc
    routers:
      # Ansible never opens a session to the router itself -- the routeros
      # role wraps routeros/apply-config.py (paramiko SSH+SFTP), which opens
      # its own session from wherever ansible-playbook runs (the EC2 hub,
      # which has WireGuard reach to both sites). "local" here means "run
      # the task on the control node", not "connect to the router". This
      # deliberately does not inherit ansible.cfg's remote_user/
      # private_key_file (the bcalaway SSH key) -- routers use admin/
      # password auth, not that key, and never see it.
      vars:
        ansible_connection: local
        ansible_become: false
      hosts:
        rt-nyc:
          ansible_host: 10.0.1.1
          site: nyc
        rt-rambles:
          ansible_host: 10.0.2.1
          site: rambles

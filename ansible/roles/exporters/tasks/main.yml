---
- name: Create compose directory
  ansible.builtin.file:
    path: /opt/compose/nuc
    state: directory
    mode: "0755"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: Create blackbox config subdirectory
  ansible.builtin.file:
    path: /opt/compose/nuc/blackbox
    state: directory
    mode: "0755"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: Copy docker-compose.yml
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../compose/nuc/docker-compose.yml"
    dest: /opt/compose/nuc/docker-compose.yml
    mode: "0644"
  notify: Restart exporter stack

- name: Copy blackbox exporter config
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../compose/nuc/blackbox/blackbox.yml"
    dest: /opt/compose/nuc/blackbox/blackbox.yml
    mode: "0644"
  notify: Restart exporter stack

- name: Open firewalld ports for exporter scraping from the WireGuard subnet
  ansible.builtin.command:
    argv:
      - firewall-cmd
      - --permanent
      - "--add-rich-rule=rule family=ipv4 source address=10.0.3.0/24 port port={{ item }} protocol=tcp accept"
  loop:
    - "9100"
    - "9115"
    - "9798"
  register: fw_add
  changed_when: "'ALREADY_ENABLED' not in (fw_add.stderr | default(''))"
  notify: Reload firewalld

- name: Flush handlers so firewall rules are live before compose starts
  ansible.builtin.meta: flush_handlers

- name: Start exporter stack
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: /opt/compose/nuc
  register: compose_up
  changed_when: "'Started' in compose_up.stdout or 'Created' in compose_up.stdout"

# speedtest-exporter's cache (SPEEDTEST_CACHE_FOR in docker-compose.yml) is
# purely time-based and shared across all clients -- whichever request
# happens to land after the cache expires is the one that triggers a real
# (link-saturating) test, with no way to force one on demand. Pairing a 24h
# cache with a request that fires right at 5am daily means that request
# almost always wins the race against Prometheus's own 15s scraping, so the
# real test consistently lands in this off-peak window instead of drifting
# to whatever time Prometheus's scrape happens to hit next.
- name: Install speedtest off-peak trigger service unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/speedtest-trigger.service
    mode: "0644"
    owner: root
    group: root
    content: |
      [Unit]
      Description=Trigger the daily off-peak speedtest-exporter run

      [Service]
      Type=oneshot
      ExecStart=/usr/bin/curl -s -o /dev/null http://localhost:9798/metrics
  notify: Reload systemd

- name: Install speedtest off-peak trigger timer unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/speedtest-trigger.timer
    mode: "0644"
    owner: root
    group: root
    content: |
      [Unit]
      Description=Run speedtest-trigger.service daily at 5am

      [Timer]
      OnCalendar=*-*-* 05:00:00
      Persistent=true

      [Install]
      WantedBy=timers.target
  notify: Reload systemd

- name: Flush handlers so systemd sees the new units before enabling the timer
  ansible.builtin.meta: flush_handlers

- name: Enable and start the speedtest off-peak trigger timer
  ansible.builtin.systemd:
    name: speedtest-trigger.timer
    state: started
    enabled: true

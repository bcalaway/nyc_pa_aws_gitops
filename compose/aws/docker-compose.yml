services:
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    ports:
      - "9100:9100"

  snmp-exporter:
    image: prom/snmp-exporter:v0.26.0
    container_name: snmp-exporter
    restart: unless-stopped
    ports:
      - "9116:9116"

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=5y
      - --storage.tsdb.retention.size=160GB
    ports:
      - "9090:9090"

  cost-exporter:
    build: ./cost-exporter
    container_name: cost-exporter
    restart: unless-stopped
    ports:
      - "9199:9199"

  loki:
    image: grafana/loki:3.3.2
    container_name: loki
    restart: unless-stopped
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/loki-config.yaml
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:3.3.2
    container_name: promtail
    restart: unless-stopped
    depends_on:
      - loki
    # Needs root to read the host journal (root:systemd-journal, 640) and
    # the Docker socket (root:docker, 660) -- both mounts below are
    # read-only regardless, so this doesn't grant write access to anything.
    user: root
    volumes:
      - ./promtail/promtail-config.yaml:/etc/promtail/config.yml:ro
      # positions.yaml (per promtail-config.yaml's `positions:` stanza)
      # lives at /tmp/positions.yaml -- without a volume here it's on the
      # container's writable layer and gets wiped on every recreation
      # (any docker-compose.yml edit, host reboot, etc.), which makes
      # Promtail re-read every tailed file/container log from the
      # beginning each time. Confirmed 2026-07-11: this is exactly what
      # caused repeated "entry too old" rejections from Loki after each
      # of several unrelated compose changes recreated this container.
      - promtail-positions:/tmp
      - /var/log/network-devices:/var/log/network-devices:ro
      - /var/log/journal:/var/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml

  grafana:
    image: grafana/grafana-oss:11.4.0
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: "smtp.gmail.com:587"
      GF_SMTP_USER: "bcalaway@gmail.com"
      GF_SMTP_PASSWORD: "${GRAFANA_SMTP_PASSWORD}"
      GF_SMTP_FROM_ADDRESS: "bcalaway@gmail.com"
      GF_SMTP_FROM_NAME: "Home Platform Grafana"
    ports:
      - "3000:3000"

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    volumes:
      - uptime-kuma-data:/app/data
    ports:
      - "3001:3001"

  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # No published port -- only other containers on the compose network
    # (Authentik, app services) need to reach it; nothing external does.

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres?sslmode=disable"
    ports:
      - "9187:9187"

volumes:
  prometheus-data:
  loki-data:
  grafana-data:
  uptime-kuma-data:
  promtail-positions:
  postgres-data:

services:
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      # postgres-backup writes postgres_backup_last_success_timestamp_seconds
      # here after each successful backup -- node-exporter's textfile
      # collector exposes it like any other metric, no pushgateway needed.
      - backup-metrics:/textfile_collector:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
      - --collector.textfile.directory=/textfile_collector
    ports:
      - "9100:9100"

  snmp-exporter:
    image: prom/snmp-exporter:v0.26.0
    container_name: snmp-exporter
    restart: unless-stopped
    ports:
      - "9116:9116"

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=5y
      - --storage.tsdb.retention.size=160GB
    ports:
      - "9090:9090"

  cost-exporter:
    build: ./cost-exporter
    container_name: cost-exporter
    restart: unless-stopped
    ports:
      - "9199:9199"

  loki:
    image: grafana/loki:3.3.2
    container_name: loki
    restart: unless-stopped
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/loki-config.yaml
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:3.3.2
    container_name: promtail
    restart: unless-stopped
    depends_on:
      - loki
    # Needs root to read the host journal (root:systemd-journal, 640) and
    # the Docker socket (root:docker, 660) -- both mounts below are
    # read-only regardless, so this doesn't grant write access to anything.
    user: root
    volumes:
      - ./promtail/promtail-config.yaml:/etc/promtail/config.yml:ro
      # positions.yaml (per promtail-config.yaml's `positions:` stanza)
      # lives at /tmp/positions.yaml -- without a volume here it's on the
      # container's writable layer and gets wiped on every recreation
      # (any docker-compose.yml edit, host reboot, etc.), which makes
      # Promtail re-read every tailed file/container log from the
      # beginning each time. Confirmed 2026-07-11: this is exactly what
      # caused repeated "entry too old" rejections from Loki after each
      # of several unrelated compose changes recreated this container.
      - promtail-positions:/tmp
      - /var/log/network-devices:/var/log/network-devices:ro
      - /var/log/journal:/var/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml

  grafana:
    image: grafana/grafana-oss:11.4.0
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: "smtp.gmail.com:587"
      GF_SMTP_USER: "bcalaway@gmail.com"
      GF_SMTP_PASSWORD: "${GRAFANA_SMTP_PASSWORD}"
      GF_SMTP_FROM_ADDRESS: "bcalaway@gmail.com"
      GF_SMTP_FROM_NAME: "Home Platform Grafana"
    ports:
      - "3000:3000"

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    volumes:
      - uptime-kuma-data:/app/data
    ports:
      - "3001:3001"

  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # Published for client access (pgAdmin, etc.) -- gated by the security
    # group to WireGuard peers only (10.0.3.0/24), same pattern as
    # Prometheus/Loki/Uptime Kuma above.
    ports:
      - "5432:5432"

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres?sslmode=disable"
    ports:
      - "9187:9187"

  postgres-backup:
    build: ./postgres-backup
    container_name: postgres-backup
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      # Uses the hub's own IMDS instance-role credentials for the S3
      # upload (terraform/aws/tls.tf's hub_postgres_backup_write policy) --
      # no AWS keys in the container.
      BACKUP_BUCKET: "home-platform-logs-147856894209"
    volumes:
      - backup-metrics:/textfile_collector

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    # General shared cache/session store, not tied to any one app. Originally
    # added for Authentik (ADR-0017), but upstream Authentik removed its
    # Redis dependency in release 2025.10 (moved to Postgres) before we
    # deployed it -- see ADR-0017's "Revisited 2026-07-18" note. Kept
    # anyway: negligible footprint, RedisInsight already set up for it, and
    # a future app may still want one.
    command: --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    # Published for client access (RedisInsight, etc.) -- gated by the
    # security group to WireGuard peers only (10.0.3.0/24), same pattern
    # as Postgres above.
    ports:
      - "6379:6379"

  authentik-server:
    image: ghcr.io/goauthentik/server:2026.2.6
    container_name: authentik-server
    restart: unless-stopped
    command: server
    depends_on:
      - postgres
    environment:
      AUTHENTIK_SECRET_KEY: "${AUTHENTIK_SECRET_KEY}"
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: "${AUTHENTIK_DB_PASSWORD}"
      # No AUTHENTIK_REDIS__* -- removed upstream in release 2025.10, see
      # ADR-0017's "Revisited 2026-07-18" note. Everything (cache, tasks,
      # sessions, websockets) now lives in Postgres.
      AUTHENTIK_BOOTSTRAP_EMAIL: "bcalaway@gmail.com"
      AUTHENTIK_BOOTSTRAP_PASSWORD: "${AUTHENTIK_BOOTSTRAP_PASSWORD}"
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
    volumes:
      - authentik-media:/media
      - authentik-templates:/templates
    # Published for initial setup/testing over WireGuard only, gated by the
    # security group (10.0.3.0/24) -- same pattern as Postgres/Redis. Public
    # access via auth.billandjessie.com (nginx) comes once this is confirmed
    # healthy.
    ports:
      - "9000:9000"
      - "9443:9443"

  authentik-worker:
    image: ghcr.io/goauthentik/server:2026.2.6
    container_name: authentik-worker
    restart: unless-stopped
    command: worker
    depends_on:
      - postgres
    environment:
      AUTHENTIK_SECRET_KEY: "${AUTHENTIK_SECRET_KEY}"
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: "${AUTHENTIK_DB_PASSWORD}"
      AUTHENTIK_BOOTSTRAP_EMAIL: "bcalaway@gmail.com"
      AUTHENTIK_BOOTSTRAP_PASSWORD: "${AUTHENTIK_BOOTSTRAP_PASSWORD}"
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
    # Deliberately NOT mounting /var/run/docker.sock (Authentik's official
    # compose does, root + full docker socket access) -- that's only needed
    # for auto-deployed Docker-based outposts, which we're not using; we
    # only need the built-in embedded OIDC provider. Skipping it avoids an
    # unnecessary privilege-escalation surface, matching this repo's general
    # pattern of scoping container mounts to what's actually used.
    volumes:
      - authentik-media:/media
      - authentik-templates:/templates
      - authentik-certs:/certs

volumes:
  prometheus-data:
  loki-data:
  grafana-data:
  uptime-kuma-data:
  promtail-positions:
  postgres-data:
  backup-metrics:
  redis-data:
  authentik-media:
  authentik-templates:
  authentik-certs:

services:
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      # postgres-backup writes postgres_backup_last_success_timestamp_seconds
      # here after each successful backup -- node-exporter's textfile
      # collector exposes it like any other metric, no pushgateway needed.
      - backup-metrics:/textfile_collector:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
      - --collector.textfile.directory=/textfile_collector
    ports:
      - "9100:9100"

  snmp-exporter:
    image: prom/snmp-exporter:v0.26.0
    container_name: snmp-exporter
    restart: unless-stopped
    ports:
      - "9116:9116"

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=5y
      - --storage.tsdb.retention.size=160GB
    ports:
      - "9090:9090"

  cost-exporter:
    build: ./cost-exporter
    container_name: cost-exporter
    restart: unless-stopped
    ports:
      - "9199:9199"

  loki:
    image: grafana/loki:3.3.2
    container_name: loki
    restart: unless-stopped
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/loki-config.yaml
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:3.3.2
    container_name: promtail
    restart: unless-stopped
    depends_on:
      - loki
    # Needs root to read the host journal (root:systemd-journal, 640) and
    # the Docker socket (root:docker, 660) -- both mounts below are
    # read-only regardless, so this doesn't grant write access to anything.
    user: root
    volumes:
      - ./promtail/promtail-config.yaml:/etc/promtail/config.yml:ro
      # positions.yaml (per promtail-config.yaml's `positions:` stanza)
      # lives at /tmp/positions.yaml -- without a volume here it's on the
      # container's writable layer and gets wiped on every recreation
      # (any docker-compose.yml edit, host reboot, etc.), which makes
      # Promtail re-read every tailed file/container log from the
      # beginning each time. Confirmed 2026-07-11: this is exactly what
      # caused repeated "entry too old" rejections from Loki after each
      # of several unrelated compose changes recreated this container.
      - promtail-positions:/tmp
      - /var/log/network-devices:/var/log/network-devices:ro
      - /var/log/journal:/var/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml

  traefik:
    image: traefik:v3.3
    container_name: traefik
    restart: unless-stopped
    command:
      - --providers.docker=true
      # Only containers with an explicit traefik.enable=true label get
      # routed -- avoids accidentally exposing an internal-only service
      # (Postgres, Redis, Prometheus, etc.) just because it's on the same
      # compose network.
      - --providers.docker.exposedByDefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      # Metrics entrypoint is deliberately not published to the host --
      # only reachable by other containers on the compose network (i.e.
      # Prometheus), same "internal-only" posture as postgres-exporter/
      # redis-exporter.
      - --entrypoints.metrics.address=:8082
      - --metrics.prometheus=true
      - --metrics.prometheus.entrypoint=metrics
      - --certificatesresolvers.route53.acme.dnschallenge=true
      - --certificatesresolvers.route53.acme.dnschallenge.provider=route53
      - --certificatesresolvers.route53.acme.email=bcalaway@gmail.com
      - --certificatesresolvers.route53.acme.storage=/letsencrypt/acme.json
    environment:
      # No AWS_ACCESS_KEY_ID/SECRET -- lego's route53 provider falls back
      # to the hub's own IMDS instance-role credentials (same pattern as
      # certbot-dns-route53 and postgres-backup's S3 upload), no static
      # keys anywhere. AWS_HOSTED_ZONE_ID pins the zone explicitly instead
      # of relying on auto-detection.
      AWS_REGION: us-east-1
      AWS_HOSTED_ZONE_ID: Z0138104TDGCUTG6KYQI
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-letsencrypt:/letsencrypt
    # Cutover to 80/443 confirmed 2026-07-18 (Milestone 11, ADR-0018) --
    # verified on alternate ports 8080/8443 first (real Let's Encrypt certs
    # issued and routing to all three domains confirmed via curl --resolve)
    # before nginx was stopped and this took over the real ports.
    ports:
      - "80:80"
      - "443:443"
    labels:
      # traefik.enable=true is required here even though this container has
      # no router of its own -- with providers.docker.exposedByDefault=false,
      # the Docker provider ignores ALL labels on a non-enabled container,
      # not just router creation. Confirmed live: the hsts middleware
      # defined below silently failed to register ("middleware
      # \"hsts@docker\" does not exist") until this was added.
      - "traefik.enable=true"
      # Shared HSTS middleware, referenced by each routed service's own
      # labels below as hsts@docker -- Traefik's Docker provider makes any
      # middleware defined on any container globally referenceable by
      # name, doesn't need to live on the container it's applied to.
      - "traefik.http.middlewares.hsts.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.hsts.headers.stsIncludeSubdomains=true"
      # Authentik forward-auth gate for Uptime Kuma (Milestone 11 --
      # kuma-proxy.yaml blueprint). trustForwardHeader lets Authentik see
      # the real client IP/host via X-Forwarded-* rather than Traefik's
      # own. authResponseHeaders passes the authenticated user's identity
      # through to the protected app (Kuma doesn't currently read these,
      # but they're harmless to forward and match Authentik's documented
      # Traefik integration exactly).
      - "traefik.http.middlewares.authentik-forward-auth.forwardauth.address=http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
      - "traefik.http.middlewares.authentik-forward-auth.forwardauth.trustForwardHeader=true"
      - "traefik.http.middlewares.authentik-forward-auth.forwardauth.authResponseHeaders=X-authentik-username,X-authentik-groups,X-authentik-entitlements,X-authentik-email,X-authentik-name,X-authentik-uid,X-authentik-jwt,X-authentik-meta-jwks,X-authentik-meta-outpost,X-authentik-meta-provider,X-authentik-meta-app,X-authentik-meta-version"

  grafana:
    image: grafana/grafana-oss:11.4.0
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      # Anonymous access retired (Milestone 11, ADR-0017) -- Grafana was
      # previously reachable read-only by anyone on the internet who knew
      # the URL (grafana.billandjessie.com's 443 is public in the security
      # group). OIDC login via Authentik replaces it below. The native
      # username/password login form is deliberately left enabled (not
      # GF_AUTH_DISABLE_LOGIN_FORM) so the existing local admin account
      # (/home-platform/grafana/admin-password) stays available as a
      # break-glass fallback if OIDC ever breaks.
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: "https://grafana.billandjessie.com"
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: "Authentik"
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: "${AUTHENTIK_GRAFANA_CLIENT_ID}"
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: "${AUTHENTIK_GRAFANA_CLIENT_SECRET}"
      GF_AUTH_GENERIC_OAUTH_SCOPES: "openid profile email"
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: "https://auth.billandjessie.com/application/o/authorize/"
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "https://auth.billandjessie.com/application/o/token/"
      GF_AUTH_GENERIC_OAUTH_API_URL: "https://auth.billandjessie.com/application/o/userinfo/"
      GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP: "true"
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: "smtp.gmail.com:587"
      GF_SMTP_USER: "bcalaway@gmail.com"
      GF_SMTP_PASSWORD: "${GRAFANA_SMTP_PASSWORD}"
      GF_SMTP_FROM_ADDRESS: "bcalaway@gmail.com"
      GF_SMTP_FROM_NAME: "Home Platform Grafana"
    ports:
      - "3000:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.billandjessie.com`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=route53"
      - "traefik.http.routers.grafana.middlewares=hsts@docker"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    volumes:
      - uptime-kuma-data:/app/data
    ports:
      - "3001:3001"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.status.rule=Host(`status.billandjessie.com`)"
      - "traefik.http.routers.status.entrypoints=websecure"
      - "traefik.http.routers.status.tls.certresolver=route53"
      # hsts first, then the Authentik gate -- order matters for a
      # middleware chain, though HSTS/forward-auth don't actually interact.
      - "traefik.http.routers.status.middlewares=hsts@docker,authentik-forward-auth@docker"
      - "traefik.http.services.status.loadbalancer.server.port=3001"

  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # Published for client access (pgAdmin, etc.) -- gated by the security
    # group to WireGuard peers only (10.0.3.0/24), same pattern as
    # Prometheus/Loki/Uptime Kuma above.
    ports:
      - "5432:5432"

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres?sslmode=disable"
    ports:
      - "9187:9187"

  postgres-backup:
    build: ./postgres-backup
    container_name: postgres-backup
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      # Uses the hub's own IMDS instance-role credentials for the S3
      # upload (terraform/aws/tls.tf's hub_postgres_backup_write policy) --
      # no AWS keys in the container.
      BACKUP_BUCKET: "home-platform-logs-147856894209"
    volumes:
      - backup-metrics:/textfile_collector

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    # General shared cache/session store, not tied to any one app. Originally
    # added for Authentik (ADR-0017), but upstream Authentik removed its
    # Redis dependency in release 2025.10 (moved to Postgres) before we
    # deployed it -- see ADR-0017's "Revisited 2026-07-18" note. Kept
    # anyway: negligible footprint, RedisInsight already set up for it, and
    # a future app may still want one.
    command: --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    # Published for client access (RedisInsight, etc.) -- gated by the
    # security group to WireGuard peers only (10.0.3.0/24), same pattern
    # as Postgres above.
    ports:
      - "6379:6379"

  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    container_name: redis-exporter
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    ports:
      - "9121:9121"

  authentik-server:
    image: ghcr.io/goauthentik/server:2026.2.6
    container_name: authentik-server
    restart: unless-stopped
    command: server
    depends_on:
      - postgres
    environment:
      AUTHENTIK_SECRET_KEY: "${AUTHENTIK_SECRET_KEY}"
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: "${AUTHENTIK_DB_PASSWORD}"
      # No AUTHENTIK_REDIS__* -- removed upstream in release 2025.10, see
      # ADR-0017's "Revisited 2026-07-18" note. Everything (cache, tasks,
      # sessions, websockets) now lives in Postgres.
      AUTHENTIK_BOOTSTRAP_EMAIL: "bcalaway@gmail.com"
      AUTHENTIK_BOOTSTRAP_PASSWORD: "${AUTHENTIK_BOOTSTRAP_PASSWORD}"
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
      # Grafana OIDC client (blueprints/grafana-oidc.yaml reads these via
      # !Env) -- not consumed directly by authentik-server itself, but both
      # server and worker get the same env since blueprint discovery/apply
      # isn't strictly worker-only across versions.
      AUTHENTIK_GRAFANA_CLIENT_ID: "${AUTHENTIK_GRAFANA_CLIENT_ID}"
      AUTHENTIK_GRAFANA_CLIENT_SECRET: "${AUTHENTIK_GRAFANA_CLIENT_SECRET}"
    volumes:
      - authentik-media:/media
      - authentik-templates:/templates
      - ./authentik/blueprints:/blueprints/local:ro
    # Also published directly over WireGuard (10.0.3.0/24, security-group
    # scoped) for debugging -- same pattern as Postgres/Redis. Public access
    # is via Traefik (labels below), not this port directly.
    ports:
      - "9000:9000"
      - "9443:9443"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=Host(`auth.billandjessie.com`)"
      - "traefik.http.routers.auth.entrypoints=websecure"
      - "traefik.http.routers.auth.tls.certresolver=route53"
      - "traefik.http.routers.auth.middlewares=hsts@docker"
      - "traefik.http.services.auth.loadbalancer.server.port=9000"
      # Authentik's own outpost callback/logout endpoints on the *protected*
      # domain (status.billandjessie.com) must reach authentik-server
      # directly, not go through the authentik-forward-auth middleware
      # itself -- this router's PathPrefix makes it more specific than the
      # status router's bare Host rule, so Traefik prefers it automatically
      # for these paths without needing an explicit priority override.
      - "traefik.http.routers.kuma-outpost.rule=Host(`status.billandjessie.com`) && PathPrefix(`/outpost.goauthentik.io/`)"
      - "traefik.http.routers.kuma-outpost.entrypoints=websecure"
      - "traefik.http.routers.kuma-outpost.tls.certresolver=route53"
      - "traefik.http.routers.kuma-outpost.service=auth"

  authentik-worker:
    image: ghcr.io/goauthentik/server:2026.2.6
    container_name: authentik-worker
    restart: unless-stopped
    command: worker
    depends_on:
      - postgres
    environment:
      AUTHENTIK_SECRET_KEY: "${AUTHENTIK_SECRET_KEY}"
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: "${AUTHENTIK_DB_PASSWORD}"
      AUTHENTIK_BOOTSTRAP_EMAIL: "bcalaway@gmail.com"
      AUTHENTIK_BOOTSTRAP_PASSWORD: "${AUTHENTIK_BOOTSTRAP_PASSWORD}"
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
      AUTHENTIK_GRAFANA_CLIENT_ID: "${AUTHENTIK_GRAFANA_CLIENT_ID}"
      AUTHENTIK_GRAFANA_CLIENT_SECRET: "${AUTHENTIK_GRAFANA_CLIENT_SECRET}"
    # Deliberately NOT mounting /var/run/docker.sock (Authentik's official
    # compose does, root + full docker socket access) -- that's only needed
    # for auto-deployed Docker-based outposts, which we're not using; we
    # only need the built-in embedded OIDC provider. Skipping it avoids an
    # unnecessary privilege-escalation surface, matching this repo's general
    # pattern of scoping container mounts to what's actually used.
    volumes:
      - authentik-media:/media
      - authentik-templates:/templates
      - authentik-certs:/certs
      - ./authentik/blueprints:/blueprints/local:ro

volumes:
  prometheus-data:
  loki-data:
  grafana-data:
  uptime-kuma-data:
  promtail-positions:
  postgres-data:
  backup-metrics:
  redis-data:
  authentik-media:
  authentik-templates:
  authentik-certs:
  traefik-letsencrypt:

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 720h

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  # Loki 3.x refuses to start with retention_enabled=true unless this is set
  # ("CONFIG ERROR: invalid compactor config: compactor.delete-request-store
  # should be configured when retention is enabled") -- not obvious from the
  # docs, easy to lose an afternoon to a crash-looping container over it.
  delete_request_store: filesystem

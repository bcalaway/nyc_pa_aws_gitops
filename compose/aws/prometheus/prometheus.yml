global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: cost-exporter
    static_configs:
      - targets: ["cost-exporter:9199"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          instance: aws-hub
      - targets: ["10.0.1.7:9100"]
        labels:
          instance: nas2

  # MikroTik RB5009s via snmp_exporter, over the WireGuard tunnel.
  # Reaches routers through the hub, so no exporter needs to run at the sites.
  - job_name: snmp
    static_configs:
      - targets: ["10.0.1.1"]
        labels:
          device: nyc-rb5009
      - targets: ["10.0.2.1"]
        labels:
          device: rambles-rb5009
      - targets: ["10.0.1.12"]
        labels:
          device: sw-10g
      - targets: ["10.0.1.11"]
        labels:
          device: sw-desk
      - targets: ["10.0.1.10"]
        labels:
          device: sw-main
      - targets: ["10.0.1.7"]
        labels:
          device: nas2
    metrics_path: /snmp
    params:
      module: [if_mib]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: snmp-exporter:9116

# Future scrape jobs, added as exporters come online (Milestone 8 stands up the NUCs):
#   - node_exporter    — NYC/Rambles NUCs and NAS
#   - snmp_exporter    — NYC RB5009 and both sites' switches, once reachable/configured
#   - blackbox_exporter — WAN health probes, all 4 connections independently
#   - speedtest_exporter — periodic throughput per WAN interface

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: cost-exporter
    static_configs:
      - targets: ["cost-exporter:9199"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          instance: aws-hub
      - targets: ["10.0.1.7:9100"]
        labels:
          instance: nas2
      - targets: ["10.0.2.10:9100"]
        labels:
          instance: nuc5

  # blackbox-exporter runs on each NUC itself (not centralized like snmp
  # below), since it needs to probe out from that site's own network.
  # icmp module only for now -- one WAN per site until Milestones 6/7
  # (dual-WAN policy routing) land, then this splits per-interface.
  - job_name: blackbox-icmp
    metrics_path: /probe
    params:
      module: [icmp]
    static_configs:
      - targets: ["1.1.1.1", "8.8.8.8"]
        labels:
          site: rambles
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 10.0.2.10:9115

  - job_name: speedtest
    static_configs:
      - targets: ["10.0.2.10:9798"]
        labels:
          instance: nuc5

  # MikroTik RB5009s via snmp_exporter, over the WireGuard tunnel.
  # Reaches routers through the hub, so no exporter needs to run at the sites.
  - job_name: snmp
    static_configs:
      - targets: ["10.0.1.1"]
        labels:
          device: nyc-rb5009
      - targets: ["10.0.2.1"]
        labels:
          device: rambles-rb5009
      - targets: ["10.0.1.12"]
        labels:
          device: sw-10g
      - targets: ["10.0.1.11"]
        labels:
          device: sw-desk
      - targets: ["10.0.1.10"]
        labels:
          device: sw-main
      - targets: ["10.0.1.7"]
        labels:
          device: nas2
    metrics_path: /snmp
    params:
      module: [if_mib]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: snmp-exporter:9116

# Future scrape jobs, added as exporters come online (Milestone 8 stands up the NUCs):
#   - node_exporter/blackbox/speedtest for nuc4 (NYC) once that NUC is installed
#   - blackbox split per-WAN-interface once Milestones 6/7 land dual-WAN policy routing

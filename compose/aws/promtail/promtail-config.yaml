server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

# rsyslog (host-level, not in this compose stack -- see CLAUDE.md) receives
# UDP 514 from network devices and writes one file per source IP under
# /var/log/network-devices/. Promtail just tails those files.
#
# Promtail's own built-in syslog scrape target was tried first and dropped:
# it only supports RFC5424 framing, while RouterOS/Cisco send legacy BSD
# syslog (RFC3164), which failed parsing with "expecting a version value
# in the range 1-999". rsyslog handles both formats natively.
#
# One static_configs entry per known device rather than a glob + relabel:
# relabel_configs run before a glob expands into individual files, so a
# regex against the per-file "filename" label never actually sees it at
# that stage -- explicit per-device __path__ sidesteps that entirely.
scrape_configs:
  - job_name: network-devices
    static_configs:
      # Both routers' self-generated syslog was long documented as broken
      # (RouterOS 7.19.6 bug, see CLAUDE.md Gotchas) based on packets never
      # arriving from the LAN-address source. Discovered 2026-07-11: they
      # DO arrive, just sourced from the router's WireGuard address
      # (10.0.3.2/10.0.3.3) instead of its LAN address (10.0.1.1/10.0.2.1)
      # -- makes sense in hindsight, since that's the interface the route
      # to the hub actually goes out. Watching both possible source files
      # per router in case this ever reverts; the LAN-address ones are
      # harmless no-ops if nothing's ever written there.
      - targets: [localhost]
        labels:
          job: network-syslog
          device: rt-nyc
          __path__: /var/log/network-devices/10.0.1.1.log
      - targets: [localhost]
        labels:
          job: network-syslog
          device: rt-nyc
          __path__: /var/log/network-devices/10.0.3.2.log
      - targets: [localhost]
        labels:
          job: network-syslog
          device: rt-rambles
          __path__: /var/log/network-devices/10.0.2.1.log
      - targets: [localhost]
        labels:
          job: network-syslog
          device: rt-rambles
          __path__: /var/log/network-devices/10.0.3.3.log
      - targets: [localhost]
        labels:
          job: network-syslog
          device: sw-main
          __path__: /var/log/network-devices/10.0.1.10.log
      - targets: [localhost]
        labels:
          job: network-syslog
          device: sw-desk
          __path__: /var/log/network-devices/10.0.1.11.log
      - targets: [localhost]
        labels:
          job: network-syslog
          device: sw-10g
          __path__: /var/log/network-devices/10.0.1.12.log
      - targets: [localhost]
        labels:
          job: network-syslog
          device: nas2
          __path__: /var/log/network-devices/10.0.1.7.log
      - targets: [localhost]
        labels:
          job: network-syslog
          device: nuc5
          __path__: /var/log/network-devices/10.0.2.10.log

  # The hub's own system logs (auth, fail2ban, dnf-automatic, sshd, etc.)
  # were never shipped anywhere -- it only ever collected everyone else's.
  # Reads the host's persistent journal, mounted read-only into the
  # container (see docker-compose.yml).
  #
  # Also picks up every Docker container's stdout/stderr, as of 2026-07-11.
  # A separate `docker` job (glob-tailing /var/lib/docker/containers/*/*-json.log
  # directly, working around a docker_sd_configs + __path__ limitation --
  # see git history) shipped container logs correctly but only labeled them
  # by opaque container_id, since that's all the json-file log path exposes
  # -- Docker's API/socket has the friendly name, and depending on it was
  # deliberately avoided after it caused the original full-history-replay
  # bug. Fix: switched Docker's default logging driver to `journald`
  # (/etc/docker/daemon.json on the host, not tracked in git -- see
  # CLAUDE.md) and recreated every container so it takes effect (log
  # driver is fixed at container-create time, a daemon restart alone
  # doesn't change it for already-running containers). journald tags every
  # container log line with CONTAINER_NAME/CONTAINER_ID_FULL fields
  # natively, no socket access needed by Promtail at all -- this job
  # already reads the journal, so container logs now arrive for free
  # through the exact same file-based, position-tracked mechanism as the
  # host's own logs. The old `docker` job is retired: once containers
  # moved to journald they stopped writing to their old *-json.log files
  # entirely, so it would just tail dead files going forward.
  - job_name: journal
    journal:
      max_age: 24h
      path: /var/log/journal
      labels:
        job: systemd-journal
        device: aws-hub
    relabel_configs:
      - source_labels: ["__journal__systemd_unit"]
        target_label: unit
      - source_labels: ["__journal_priority_keyword"]
        target_label: level
      - source_labels: ["__journal_container_name"]
        target_label: container
      - source_labels: ["__journal_container_id_full"]
        target_label: container_id

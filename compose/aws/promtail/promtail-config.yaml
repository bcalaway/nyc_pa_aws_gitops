server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

# rsyslog (host-level, not in this compose stack -- see CLAUDE.md) receives
# UDP 514 from network devices and writes one file per source IP under
# /var/log/network-devices/. Promtail just tails those files.
#
# Promtail's own built-in syslog scrape target was tried first and dropped:
# it only supports RFC5424 framing, while RouterOS/Cisco send legacy BSD
# syslog (RFC3164), which failed parsing with "expecting a version value
# in the range 1-999". rsyslog handles both formats natively.
#
# One static_configs entry per known device rather than a glob + relabel:
# relabel_configs run before a glob expands into individual files, so a
# regex against the per-file "filename" label never actually sees it at
# that stage -- explicit per-device __path__ sidesteps that entirely.
scrape_configs:
  - job_name: network-devices
    static_configs:
      # Both routers' self-generated syslog was long documented as broken
      # (RouterOS 7.19.6 bug, see CLAUDE.md Gotchas) based on packets never
      # arriving from the LAN-address source. Discovered 2026-07-11: they
      # DO arrive, just sourced from the router's WireGuard address
      # (10.0.3.2/10.0.3.3) instead of its LAN address (10.0.1.1/10.0.2.1)
      # -- makes sense in hindsight, since that's the interface the route
      # to the hub actually goes out. Watching both possible source files
      # per router in case this ever reverts; the LAN-address ones are
      # harmless no-ops if nothing's ever written there.
      - targets: [localhost]
        labels:
          job: network-syslog
          device: rt-nyc
          __path__: /var/log/network-devices/10.0.1.1.log
      - targets: [localhost]
        labels:
          job: network-syslog
          device: rt-nyc
          __path__: /var/log/network-devices/10.0.3.2.log
      - targets: [localhost]
        labels:
          job: network-syslog
          device: rt-rambles
          __path__: /var/log/network-devices/10.0.2.1.log
      - targets: [localhost]
        labels:
          job: network-syslog
          device: rt-rambles
          __path__: /var/log/network-devices/10.0.3.3.log
      - targets: [localhost]
        labels:
          job: network-syslog
          device: sw-main
          __path__: /var/log/network-devices/10.0.1.10.log
      - targets: [localhost]
        labels:
          job: network-syslog
          device: sw-desk
          __path__: /var/log/network-devices/10.0.1.11.log
      - targets: [localhost]
        labels:
          job: network-syslog
          device: sw-10g
          __path__: /var/log/network-devices/10.0.1.12.log
      - targets: [localhost]
        labels:
          job: network-syslog
          device: nas2
          __path__: /var/log/network-devices/10.0.1.7.log
      - targets: [localhost]
        labels:
          job: network-syslog
          device: nuc5
          __path__: /var/log/network-devices/10.0.2.10.log

  # The hub's own system logs (auth, fail2ban, dnf-automatic, sshd, etc.)
  # were never shipped anywhere -- it only ever collected everyone else's.
  # Reads the host's persistent journal, mounted read-only into the
  # container (see docker-compose.yml).
  - job_name: journal
    journal:
      max_age: 24h
      path: /var/log/journal
      labels:
        job: systemd-journal
        device: aws-hub
    relabel_configs:
      - source_labels: ["__journal__systemd_unit"]
        target_label: unit
      - source_labels: ["__journal_priority_keyword"]
        target_label: level

  # Every container's stdout/stderr in this compose stack (Grafana,
  # Prometheus, Loki itself, etc.), tailed as plain files via Promtail's
  # normal position-tracked file watcher -- same mechanism as the
  # network-devices job above.
  #
  # This was originally attempted via docker_sd_configs + a relabeled
  # __path__ (the commonly-cited pattern for forcing file-based tailing
  # instead of Docker-API log streaming). Confirmed 2026-07-11 that this
  # does NOT work on Promtail 3.3.2: docker_sd_configs targets are always
  # consumed by Promtail's Docker-API-streaming target type, which never
  # reads __path__ at all -- that field is only honored by targets built
  # from static_configs/file_sd_configs (a real FileTarget). Evidence: "add
  # Docker target" / "finished transferring logs" log lines (the streaming
  # code path, target.go) fired for every container, while "tail routine:
  # started" (the file-based path, tailer.go) never once fired for a
  # container path, even though /targets showed the SD targets as
  # discovered and ready. This is a known limitation, not a config mistake
  # -- see grafana/loki issues around docker_sd_configs + __path__.
  #
  # Fix: skip discovery-based labeling entirely and glob the log files
  # directly, same as a plain file job. This IS safe to glob (unlike
  # network-devices above): that job avoids globbing because it needs
  # relabel_configs to turn each matched *filename* into a device label,
  # and relabeling runs before a glob expands into individual files. Here
  # we don't need anything from the filename except the container ID
  # that's already embedded in the matched path, which the json pipeline
  # stage below plus a regex on `filename` can both reach post-expansion.
  #
  # Docker's log file path only contains the opaque container ID, not its
  # name (that mapping only exists in the Docker API/socket, which this
  # approach deliberately avoids depending on). Labeling by ID alone and
  # cross-referencing via `docker ps` when needed is an acceptable
  # simplification -- avoids re-introducing the same discovery-based
  # dependency that broke file tailing in the first place.
  - job_name: docker
    static_configs:
      - targets: [localhost]
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            time: time
      - labels:
          stream:
      - timestamp:
          source: time
          format: RFC3339Nano
      - output:
          source: output
      - regex:
          source: filename
          expression: '/var/lib/docker/containers/(?P<container_id>[0-9a-f]+)/.*-json\.log'
      - labels:
          container_id:

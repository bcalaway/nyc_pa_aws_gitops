<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bill &amp; Jessie</title>
<style>
  :root {
    color-scheme: dark;
  }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f1115;
    color: #e6e6e6;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  main {
    max-width: 420px;
    width: 100%;
    padding: 2rem;
    text-align: center;
  }
  h1 {
    font-weight: 600;
    font-size: 1.75rem;
    margin-bottom: 0.25rem;
  }
  p.sub {
    color: #9aa0a6;
    margin-top: 0;
    margin-bottom: 2rem;
  }
  .links {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  a.link {
    display: block;
    padding: 0.9rem 1rem;
    border-radius: 10px;
    background: #1a1d24;
    border: 1px solid #2a2e37;
    color: #e6e6e6;
    text-decoration: none;
    font-size: 1rem;
    transition: border-color 0.15s ease;
  }
  a.link:hover {
    border-color: #4a90e2;
  }
  a.link .desc {
    display: block;
    color: #9aa0a6;
    font-size: 0.85rem;
    margin-top: 0.15rem;
  }
  footer {
    margin-top: 2.5rem;
    color: #5b6068;
    font-size: 0.8rem;
  }
</style>
</head>
<body>
<main>
  <h1>Bill &amp; Jessie</h1>
  <p class="sub">Home platform status and links</p>
  <div class="links">
    <a class="link" href="https://status.billandjessie.com">
      Status
      <span class="desc">Service and WAN uptime</span>
    </a>
    <a class="link" href="https://grafana.billandjessie.com">
      Grafana
      <span class="desc">Metrics and dashboards</span>
    </a>
  </div>
  <footer>billandjessie.com</footer>
</main>
</body>
</html>

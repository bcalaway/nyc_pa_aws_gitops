<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Diagram — Bill &amp; Jessie</title>
<style>
  :root {
    color-scheme: dark;
  }
  body {
    margin: 0;
    min-height: 100vh;
    background: #0f1115;
    color: #e6e6e6;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    justify-content: center;
  }
  main {
    max-width: 1040px;
    width: 100%;
    padding: 2rem 1.25rem 3rem;
  }
  h1 {
    font-weight: 600;
    font-size: 1.75rem;
    margin-bottom: 0.25rem;
    text-align: center;
  }
  p.sub {
    color: #9aa0a6;
    margin-top: 0;
    margin-bottom: 1.75rem;
    text-align: center;
  }
  .diagram {
    background: #14161c;
    border: 1px solid #2a2e37;
    border-radius: 14px;
    padding: 1rem;
    overflow-x: auto;
  }
  svg { width: 100%; min-width: 900px; height: auto; display: block; }
  .back {
    display: block;
    text-align: center;
    margin-top: 1.75rem;
    color: #9aa0a6;
    text-decoration: none;
    font-size: 0.9rem;
  }
  .back:hover { color: #4a90e2; }
  footer {
    margin-top: 2.5rem;
    color: #5b6068;
    font-size: 0.8rem;
    text-align: center;
  }
</style>
</head>
<body>
<main>
  <h1>Network Diagram</h1>
  <p class="sub">NYC + Rambles + AWS hub — updated 2026-07-17</p>
  <div class="diagram">
    <svg viewBox="0 0 1000 860" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="#5b6068"/>
        </marker>

        <!-- Device-type icons, 20x20, stroke-only line art. Color is set per <use>
             (zone color), not baked in here, since the same icon appears in
             multiple zones. -->
        <symbol id="i-router" viewBox="0 0 20 20">
          <g fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="12" width="14" height="6" rx="1.5"/>
            <path d="M7 12V8m6 4V8"/>
            <circle cx="7" cy="6" r="1.2"/>
            <circle cx="13" cy="6" r="1.2"/>
          </g>
        </symbol>
        <symbol id="i-switch" viewBox="0 0 20 20">
          <g fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="16" height="8" rx="1.5"/>
            <path d="M6 15v2M10 15v2M14 15v2"/>
          </g>
        </symbol>
        <symbol id="i-server" viewBox="0 0 20 20">
          <g fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="2" width="12" height="16" rx="1.5"/>
            <path d="M4 8h12M4 13h12"/>
          </g>
        </symbol>
        <symbol id="i-nas" viewBox="0 0 20 20">
          <g fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="14" height="6" rx="1.3"/>
            <rect x="3" y="11" width="14" height="6" rx="1.3"/>
            <path d="M13 6h2M13 14h2"/>
          </g>
        </symbol>
        <symbol id="i-camera" viewBox="0 0 20 20">
          <g fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="6" width="12" height="9" rx="1.8"/>
            <circle cx="8" cy="10.5" r="2.5"/>
            <path d="M14 8.5l4-2v8l-4-2z"/>
          </g>
        </symbol>
        <symbol id="i-printer" viewBox="0 0 20 20">
          <g fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="7" width="14" height="7" rx="1.3"/>
            <path d="M6 7V4h8v3"/>
            <path d="M6 14v3h8v-3"/>
          </g>
        </symbol>
        <symbol id="i-monitor" viewBox="0 0 20 20">
          <g fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="14" height="10" rx="1.3"/>
            <path d="M7 17h6M10 13v4"/>
          </g>
        </symbol>
        <symbol id="i-wifi" viewBox="0 0 20 20">
          <g fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 8a9 9 0 0 1 12 0"/>
            <path d="M6.5 11a5.5 5.5 0 0 1 7 0"/>
            <circle cx="10" cy="14.5" r="1.1"/>
          </g>
        </symbol>
        <symbol id="i-bulb" viewBox="0 0 20 20">
          <g fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 2.5a5.5 5.5 0 0 0-3.2 10c.55.42.9 1.05.9 1.9h4.6c0-.85.35-1.48.9-1.9A5.5 5.5 0 0 0 10 2.5z"/>
            <path d="M8.2 17h3.6M8.8 19h2.4"/>
          </g>
        </symbol>
        <symbol id="i-speaker" viewBox="0 0 20 20">
          <g fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 8v4h3l4.5 3.5v-10.5L6 8z"/>
            <path d="M14 7.5a4.2 4.2 0 0 1 0 5M16.2 5.8a7 7 0 0 1 0 8.4"/>
          </g>
        </symbol>
      </defs>

      <!-- Internet -->
      <rect x="400" y="16" width="200" height="46" rx="10" fill="#1a1d24" stroke="#565c6b"/>
      <text x="500" y="44" text-anchor="middle" fill="#e6e6e6" font-size="15" font-weight="600">Internet</text>

      <!-- WAN lines — routed around the AWS Hub box (elbow paths), not through it -->
      <path d="M 400,40 L 170,40 L 170,330" fill="none" stroke="#5b6068" stroke-width="1.5"/>
      <text x="178" y="205" fill="#9aa0a6" font-size="12">FiOS (WAN1)</text>

      <path d="M 600,40 L 830,40 L 830,330" fill="none" stroke="#5b6068" stroke-width="1.5"/>
      <text x="705" y="205" fill="#9aa0a6" font-size="12">Blue Ridge (WAN1)</text>

      <line x1="500" y1="62" x2="500" y2="112" stroke="#5b6068" stroke-width="1.5"/>
      <text x="512" y="90" fill="#9aa0a6" font-size="12">public IP</text>

      <!-- AWS Hub (blue zone) -->
      <rect x="330" y="112" width="340" height="176" rx="12" fill="#171a21" stroke="#3987e5" stroke-width="1.5"/>
      <text x="500" y="138" text-anchor="middle" fill="#e6e6e6" font-size="16" font-weight="600">AWS Hub — EC2 (us-east-1)</text>
      <text x="500" y="157" text-anchor="middle" fill="#9aa0a6" font-size="11">3.82.89.106 · WireGuard 10.0.3.1</text>

      <rect x="350" y="170" width="145" height="50" rx="8" fill="#1a1d24" stroke="#316cb5"/>
      <text x="422" y="189" text-anchor="middle" fill="#e6e6e6" font-size="12" font-weight="600">Observability</text>
      <text x="422" y="204" text-anchor="middle" fill="#9aa0a6" font-size="10.5">Prometheus · Grafana</text>
      <text x="422" y="216" text-anchor="middle" fill="#9aa0a6" font-size="10.5">Loki · Uptime Kuma</text>

      <rect x="505" y="170" width="145" height="50" rx="8" fill="#1a1d24" stroke="#316cb5"/>
      <text x="577" y="189" text-anchor="middle" fill="#e6e6e6" font-size="12" font-weight="600">Public DNS / TLS</text>
      <text x="577" y="204" text-anchor="middle" fill="#9aa0a6" font-size="10.5">Route53 · nginx</text>
      <text x="577" y="216" text-anchor="middle" fill="#9aa0a6" font-size="10.5">Let's Encrypt</text>

      <rect x="350" y="228" width="145" height="44" rx="8" fill="#1a1d24" stroke="#316cb5"/>
      <text x="422" y="247" text-anchor="middle" fill="#e6e6e6" font-size="12" font-weight="600">rsyslog</text>
      <text x="422" y="262" text-anchor="middle" fill="#9aa0a6" font-size="10.5">UDP 514 → Loki</text>

      <rect x="505" y="228" width="145" height="44" rx="8" fill="#1a1d24" stroke="#316cb5"/>
      <text x="577" y="247" text-anchor="middle" fill="#e6e6e6" font-size="12" font-weight="600">Portal (this site)</text>
      <text x="577" y="262" text-anchor="middle" fill="#9aa0a6" font-size="10.5">S3 + CloudFront</text>

      <!-- WireGuard tunnels -->
      <line x1="420" y1="288" x2="240" y2="360" stroke="#3987e5" stroke-width="1.5" stroke-dasharray="5,4"/>
      <text x="255" y="330" fill="#3987e5" font-size="11.5">WireGuard</text>
      <text x="255" y="344" fill="#3987e5" font-size="11.5">10.0.3.2</text>

      <line x1="580" y1="288" x2="760" y2="360" stroke="#3987e5" stroke-width="1.5" stroke-dasharray="5,4"/>
      <text x="705" y="330" fill="#3987e5" font-size="11.5">WireGuard</text>
      <text x="705" y="344" fill="#3987e5" font-size="11.5">10.0.3.3</text>

      <!-- NYC <-> Rambles LAN trust -->
      <line x1="330" y1="420" x2="670" y2="420" stroke="#008300" stroke-width="1.5" stroke-dasharray="2,4"/>
      <text x="500" y="412" text-anchor="middle" fill="#1fae1f" font-size="11.5">site-to-site LAN trust (via hub)</text>

      <!-- NYC site (aqua zone) -->
      <rect x="30" y="330" width="330" height="442" rx="12" fill="#171a21" stroke="#199e70" stroke-width="1.5"/>
      <text x="195" y="356" text-anchor="middle" fill="#e6e6e6" font-size="16" font-weight="600">NYC</text>
      <text x="195" y="374" text-anchor="middle" fill="#9aa0a6" font-size="11">LAN 10.0.1.0/24</text>

      <!-- Link speeds verified live 2026-07-11: all 1Gbps except sw-10g<->nas2 (real 10G SFP+ module) -->
      <line x1="195" y1="422" x2="195" y2="436" stroke="#5b6068" stroke-width="2"/>

      <!-- Direct-to-router devices (ether6/7/8) — confirmed NOT behind the switch chain,
           routed via the side margins so they don't cross the switch-chain boxes below -->
      <path d="M 50,404 L 40,404 L 40,678 L 94,678 L 94,690" fill="none" stroke="#5b6068" stroke-width="1.5"/>
      <path d="M 340,398 L 348,398 L 348,682 L 195,682 L 195,690" fill="none" stroke="#5b6068" stroke-width="1.5"/>
      <path d="M 340,412 L 356,412 L 356,686 L 296,686 L 296,690" fill="none" stroke="#5b6068" stroke-width="1.5"/>

      <!-- Router -->
      <rect x="50" y="388" width="290" height="34" rx="8" fill="#1a1d24" stroke="#197e5d"/>
      <use href="#i-router" x="58" y="398" width="14" height="14" stroke="#199e70"/>
      <text x="80" y="409" fill="#e6e6e6" font-size="12.5" font-weight="600">rt-nyc · .1</text>

      <!-- Switch chain: router -> sw-main -> sw-10g -> sw-desk -->
      <rect x="50" y="436" width="290" height="34" rx="8" fill="#1a1d24" stroke="#197e5d"/>
      <use href="#i-switch" x="58" y="446" width="14" height="14" stroke="#199e70"/>
      <text x="80" y="457" fill="#e6e6e6" font-size="12.5" font-weight="600">sw-main · .10</text>

      <line x1="195" y1="470" x2="195" y2="484" stroke="#5b6068" stroke-width="2"/>

      <rect x="50" y="484" width="190" height="34" rx="8" fill="#1a1d24" stroke="#197e5d"/>
      <use href="#i-switch" x="58" y="494" width="14" height="14" stroke="#199e70"/>
      <text x="80" y="505" fill="#e6e6e6" font-size="12" font-weight="600">sw-10g · .12</text>

      <line x1="240" y1="501" x2="250" y2="501" stroke="#d95926" stroke-width="2.5"/>
      <rect x="250" y="484" width="90" height="34" rx="8" fill="#1a1d24" stroke="#197e5d"/>
      <use href="#i-nas" x="256" y="500" width="14" height="14" stroke="#199e70"/>
      <text x="274" y="501" fill="#e6e6e6" font-size="10">nas2</text>
      <text x="274" y="513" fill="#9aa0a6" font-size="8.5">.7</text>

      <!-- furry: 10G to sw-10g, currently powered off -->
      <path d="M 240,518 L 240,539 L 250,539" fill="none" stroke="#d95926" stroke-width="2.5"/>
      <rect x="250" y="522" width="90" height="34" rx="8" fill="#1a1d24" stroke="#197e5d"/>
      <use href="#i-server" x="256" y="538" width="14" height="14" stroke="#199e70"/>
      <text x="274" y="539" fill="#e6e6e6" font-size="10">furry</text>
      <text x="274" y="551" fill="#9aa0a6" font-size="8.5">.41 (off)</text>

      <line x1="195" y1="518" x2="195" y2="566" stroke="#5b6068" stroke-width="2"/>

      <rect x="50" y="566" width="190" height="34" rx="8" fill="#1a1d24" stroke="#197e5d"/>
      <use href="#i-switch" x="58" y="576" width="14" height="14" stroke="#199e70"/>
      <text x="80" y="587" fill="#e6e6e6" font-size="12" font-weight="600">sw-desk · .11</text>

      <line x1="240" y1="583" x2="250" y2="583" stroke="#5b6068" stroke-width="2"/>
      <rect x="250" y="566" width="90" height="34" rx="8" fill="#1a1d24" stroke="#197e5d"/>
      <use href="#i-printer" x="256" y="582" width="14" height="14" stroke="#199e70"/>
      <text x="274" y="583" fill="#e6e6e6" font-size="10">printer</text>
      <text x="274" y="595" fill="#9aa0a6" font-size="8.5">.5</text>

      <!-- IoT cluster: reachable via sw-main's router-facing port, exact final-hop wiring
           unresolved — box stays neutral/dashed for that reason, but the devices
           themselves are known NYC devices, so their icons keep the zone color -->
      <rect x="50" y="618" width="290" height="54" rx="8" fill="#101319" stroke="#565c6b" stroke-dasharray="3,3"/>
      <use href="#i-bulb" x="60" y="633" width="14" height="14" stroke="#199e70"/>
      <text x="80" y="644" fill="#e6e6e6" font-size="11">hue-nyc</text>
      <use href="#i-speaker" x="156" y="633" width="14" height="14" stroke="#199e70"/>
      <text x="176" y="644" fill="#e6e6e6" font-size="11">Sonos ×3</text>
      <use href="#i-wifi" x="252" y="633" width="14" height="14" stroke="#199e70"/>
      <text x="272" y="644" fill="#e6e6e6" font-size="11">Nighthawk</text>
      <text x="195" y="662" text-anchor="middle" fill="#7d838c" font-size="9">via sw-main gi4 — exact wiring TBD</text>

      <!-- Camera NVR / nuc4 / kvm-nyc: each its own dedicated router port, confirmed via
           bridge-table lookup — NOT part of the IoT cluster above despite sitting below it -->
      <rect x="50" y="690" width="88" height="40" rx="8" fill="#1a1d24" stroke="#197e5d"/>
      <use href="#i-camera" x="56" y="706" width="14" height="14" stroke="#199e70"/>
      <text x="74" y="706" fill="#e6e6e6" font-size="10">Camera NVR</text>
      <text x="74" y="719" fill="#9aa0a6" font-size="8.5">.65 · ether6</text>

      <rect x="151" y="690" width="88" height="40" rx="8" fill="#1a1d24" stroke="#197e5d"/>
      <use href="#i-server" x="157" y="706" width="14" height="14" stroke="#199e70"/>
      <text x="175" y="706" fill="#e6e6e6" font-size="10">nuc4</text>
      <text x="175" y="719" fill="#9aa0a6" font-size="8.5">.34 · ether7</text>

      <rect x="252" y="690" width="88" height="40" rx="8" fill="#1a1d24" stroke="#197e5d"/>
      <use href="#i-monitor" x="258" y="706" width="14" height="14" stroke="#199e70"/>
      <text x="276" y="706" fill="#e6e6e6" font-size="10">kvm-nyc</text>
      <text x="276" y="719" fill="#9aa0a6" font-size="8.5">.66 · ether8</text>

      <text x="195" y="754" text-anchor="middle" fill="#7d838c" font-size="10">Building WiFi (WAN2 backup) — planned, Milestone 7</text>

      <!-- Rambles site (violet zone) -->
      <rect x="640" y="330" width="330" height="260" rx="12" fill="#171a21" stroke="#9085e9" stroke-width="1.5"/>
      <text x="805" y="356" text-anchor="middle" fill="#e6e6e6" font-size="16" font-weight="600">Rambles</text>
      <text x="805" y="374" text-anchor="middle" fill="#9aa0a6" font-size="11">LAN 10.0.2.0/24</text>

      <rect x="660" y="388" width="290" height="34" rx="8" fill="#1a1d24" stroke="#726bb8"/>
      <use href="#i-router" x="668" y="398" width="14" height="14" stroke="#9085e9"/>
      <text x="690" y="409" fill="#e6e6e6" font-size="12.5" font-weight="600">rt-rambles · .1</text>

      <!-- All four below connect directly to the router, not to each other -->
      <line x1="725" y1="422" x2="725" y2="436" stroke="#5b6068" stroke-width="2"/>
      <rect x="660" y="436" width="130" height="34" rx="8" fill="#101319" stroke="#565c6b" stroke-dasharray="3,3"/>
      <use href="#i-switch" x="666" y="449" width="14" height="14" stroke="#9aa0a6"/>
      <text x="684" y="450" fill="#e6e6e6" font-size="10">switch</text>
      <text x="684" y="462" fill="#7d838c" font-size="8.5">mgmt IP unknown</text>

      <line x1="875" y1="422" x2="875" y2="436" stroke="#d95926" stroke-width="2.5"/>
      <rect x="800" y="436" width="150" height="34" rx="8" fill="#1a1d24" stroke="#726bb8"/>

      <text x="830" y="450" fill="#e6e6e6" font-size="11">nuc5</text>
      <text x="830" y="462" fill="#9aa0a6" font-size="9">.10</text>

      <path d="M 700,422 L 645,422 L 645,501 L 660,501" fill="none" stroke="#5b6068" stroke-width="2"/>
      <rect x="660" y="484" width="90" height="34" rx="8" fill="#1a1d24" stroke="#726bb8"/>
      <use href="#i-monitor" x="666" y="497" width="14" height="14" stroke="#9085e9"/>
      <text x="684" y="498" fill="#e6e6e6" font-size="10">kvm-nuc5</text>
      <text x="684" y="510" fill="#9aa0a6" font-size="8.5">.226</text>

      <!-- ZenWiFi: main mesh node wired to router (per Bill); other 2 nodes backhaul wirelessly -->
      <path d="M 795,422 L 795,478 L 805,478 L 805,484" fill="none" stroke="#5b6068" stroke-width="2"/>
      <rect x="760" y="484" width="90" height="34" rx="8" fill="#1a1d24" stroke="#726bb8"/>

      <path d="M 910,422 L 965,422 L 965,501 L 950,501" fill="none" stroke="#5b6068" stroke-width="2"/>
      <rect x="860" y="484" width="90" height="34" rx="8" fill="#1a1d24" stroke="#726bb8"/>
      <use href="#i-bulb" x="866" y="497" width="14" height="14" stroke="#9085e9"/>
      <text x="884" y="498" fill="#e6e6e6" font-size="9">hue-rambles</text>
      <text x="884" y="510" fill="#9aa0a6" font-size="8.5">.244</text>

      <text x="805" y="540" text-anchor="middle" fill="#7d838c" font-size="10">Starlink (WAN2 backup) — planned, Milestone 6</text>

      <!-- Legend -->
      <line x1="30" y1="807" x2="55" y2="807" stroke="#5b6068" stroke-width="2"/>
      <text x="62" y="811" fill="#9aa0a6" font-size="11">1 Gbps link</text>

      <line x1="170" y1="807" x2="195" y2="807" stroke="#d95926" stroke-width="2.5"/>
      <text x="202" y="811" fill="#9aa0a6" font-size="11">10 Gbps link</text>

      <line x1="330" y1="807" x2="355" y2="807" stroke="#3987e5" stroke-width="1.5" stroke-dasharray="5,4"/>
      <text x="362" y="811" fill="#9aa0a6" font-size="11">WireGuard tunnel</text>

      <line x1="30" y1="831" x2="55" y2="831" stroke="#008300" stroke-width="1.5" stroke-dasharray="2,4"/>
      <text x="62" y="835" fill="#9aa0a6" font-size="11">Site-to-site LAN route</text>

      <rect x="230" y="824" width="16" height="14" rx="3" fill="#101319" stroke="#565c6b" stroke-dasharray="3,3"/>
      <text x="252" y="835" fill="#9aa0a6" font-size="11">Planned / unresolved wiring</text>
    </svg>
  </div>

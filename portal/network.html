<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Diagram — Bill &amp; Jessie</title>
<style>
  :root {
    color-scheme: dark;
  }
  body {
    margin: 0;
    min-height: 100vh;
    background: #0f1115;
    color: #e6e6e6;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    justify-content: center;
  }
  main {
    max-width: 1040px;
    width: 100%;
    padding: 2rem 1.25rem 3rem;
  }
  h1 {
    font-weight: 600;
    font-size: 1.75rem;
    margin-bottom: 0.25rem;
    text-align: center;
  }
  p.sub {
    color: #9aa0a6;
    margin-top: 0;
    margin-bottom: 1.75rem;
    text-align: center;
  }
  .diagram {
    background: #14161c;
    border: 1px solid #2a2e37;
    border-radius: 14px;
    padding: 1rem;
    overflow-x: auto;
  }
  svg { width: 100%; min-width: 900px; height: auto; display: block; }
  .back {
    display: block;
    text-align: center;
    margin-top: 1.75rem;
    color: #9aa0a6;
    text-decoration: none;
    font-size: 0.9rem;
  }
  .back:hover { color: #4a90e2; }
  footer {
    margin-top: 2.5rem;
    color: #5b6068;
    font-size: 0.8rem;
    text-align: center;
  }
</style>
</head>
<body>
<main>
  <h1>Network Diagram</h1>
  <p class="sub">NYC + Rambles + AWS hub — updated 2026-07-10</p>
  <div class="diagram">
    <svg viewBox="0 0 1000 840" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="#5b6068"/>
        </marker>
      </defs>

      <!-- Internet -->
      <rect x="400" y="16" width="200" height="46" rx="10" fill="#1a1d24" stroke="#2a2e37"/>
      <text x="500" y="44" text-anchor="middle" fill="#e6e6e6" font-size="15" font-weight="600">Internet</text>

      <!-- WAN lines — routed around the AWS Hub box (elbow paths), not through it -->
      <path d="M 400,40 L 170,40 L 170,330" fill="none" stroke="#5b6068" stroke-width="1.5"/>
      <text x="178" y="205" fill="#9aa0a6" font-size="12">FiOS (WAN1)</text>

      <path d="M 600,40 L 830,40 L 830,330" fill="none" stroke="#5b6068" stroke-width="1.5"/>
      <text x="705" y="205" fill="#9aa0a6" font-size="12">Blue Ridge (WAN1)</text>

      <line x1="500" y1="62" x2="500" y2="112" stroke="#5b6068" stroke-width="1.5"/>
      <text x="512" y="90" fill="#9aa0a6" font-size="12">public IP</text>

      <!-- AWS Hub -->
      <rect x="330" y="112" width="340" height="176" rx="12" fill="#171a21" stroke="#4a90e2" stroke-width="1.5"/>
      <text x="500" y="138" text-anchor="middle" fill="#e6e6e6" font-size="16" font-weight="600">AWS Hub — EC2 (us-east-1)</text>
      <text x="500" y="157" text-anchor="middle" fill="#9aa0a6" font-size="11">3.82.89.106 · WireGuard 10.0.3.1</text>

      <rect x="350" y="170" width="145" height="50" rx="8" fill="#1a1d24" stroke="#2a2e37"/>
      <text x="422" y="189" text-anchor="middle" fill="#e6e6e6" font-size="12" font-weight="600">Observability</text>
      <text x="422" y="204" text-anchor="middle" fill="#9aa0a6" font-size="10.5">Prometheus · Grafana</text>
      <text x="422" y="216" text-anchor="middle" fill="#9aa0a6" font-size="10.5">Loki · Uptime Kuma</text>

      <rect x="505" y="170" width="145" height="50" rx="8" fill="#1a1d24" stroke="#2a2e37"/>
      <text x="577" y="189" text-anchor="middle" fill="#e6e6e6" font-size="12" font-weight="600">Public DNS / TLS</text>
      <text x="577" y="204" text-anchor="middle" fill="#9aa0a6" font-size="10.5">Route53 · nginx</text>
      <text x="577" y="216" text-anchor="middle" fill="#9aa0a6" font-size="10.5">Let's Encrypt</text>

      <rect x="350" y="228" width="145" height="44" rx="8" fill="#1a1d24" stroke="#2a2e37"/>
      <text x="422" y="247" text-anchor="middle" fill="#e6e6e6" font-size="12" font-weight="600">rsyslog</text>
      <text x="422" y="262" text-anchor="middle" fill="#9aa0a6" font-size="10.5">UDP 514 → Loki</text>

      <rect x="505" y="228" width="145" height="44" rx="8" fill="#1a1d24" stroke="#2a2e37"/>
      <text x="577" y="247" text-anchor="middle" fill="#e6e6e6" font-size="12" font-weight="600">Portal (this site)</text>
      <text x="577" y="262" text-anchor="middle" fill="#9aa0a6" font-size="10.5">S3 + CloudFront</text>

      <!-- WireGuard tunnels -->
      <line x1="420" y1="288" x2="240" y2="360" stroke="#4a90e2" stroke-width="1.5" stroke-dasharray="5,4"/>
      <text x="255" y="330" fill="#4a90e2" font-size="11.5">WireGuard</text>
      <text x="255" y="344" fill="#4a90e2" font-size="11.5">10.0.3.2</text>

      <line x1="580" y1="288" x2="760" y2="360" stroke="#4a90e2" stroke-width="1.5" stroke-dasharray="5,4"/>
      <text x="705" y="330" fill="#4a90e2" font-size="11.5">WireGuard</text>
      <text x="705" y="344" fill="#4a90e2" font-size="11.5">10.0.3.3</text>

      <!-- NYC <-> Rambles LAN trust -->
      <line x1="330" y1="420" x2="670" y2="420" stroke="#6fcf97" stroke-width="1.5" stroke-dasharray="2,4"/>
      <text x="500" y="412" text-anchor="middle" fill="#6fcf97" font-size="11.5">site-to-site LAN trust (via hub)</text>

      <!-- NYC site -->
      <rect x="30" y="330" width="330" height="430" rx="12" fill="#171a21" stroke="#2a2e37" stroke-width="1.5"/>
      <text x="195" y="356" text-anchor="middle" fill="#e6e6e6" font-size="16" font-weight="600">NYC</text>
      <text x="195" y="374" text-anchor="middle" fill="#9aa0a6" font-size="11">LAN 10.0.1.0/24</text>

      <rect x="50" y="388" width="290" height="34" rx="8" fill="#1a1d24" stroke="#2a2e37"/>
      <text x="195" y="409" text-anchor="middle" fill="#e6e6e6" font-size="12.5" font-weight="600">rt-nyc — MikroTik RB5009 · .1</text>

      <!-- Link speeds verified live 2026-07-11: all 1Gbps except sw-10g<->nas2 (real 10G SFP+ module) -->
      <line x1="195" y1="422" x2="195" y2="436" stroke="#5b6068" stroke-width="2"/>

      <!-- Switch chain: router -> sw-main -> sw-10g -> sw-desk -->
      <rect x="50" y="436" width="290" height="34" rx="8" fill="#1a1d24" stroke="#2a2e37"/>
      <text x="195" y="457" text-anchor="middle" fill="#e6e6e6" font-size="12" font-weight="600">sw-main · .10</text>

      <line x1="195" y1="470" x2="195" y2="484" stroke="#5b6068" stroke-width="2"/>

      <rect x="50" y="484" width="190" height="34" rx="8" fill="#1a1d24" stroke="#2a2e37"/>
      <text x="145" y="505" text-anchor="middle" fill="#e6e6e6" font-size="12" font-weight="600">sw-10g · .12</text>

      <line x1="240" y1="501" x2="250" y2="501" stroke="#f2994a" stroke-width="2.5"/>
      <rect x="250" y="484" width="90" height="34" rx="8" fill="#1a1d24" stroke="#2a2e37"/>
      <text x="295" y="501" text-anchor="middle" fill="#e6e6e6" font-size="11">nas2</text>
      <text x="295" y="513" text-anchor="middle" fill="#9aa0a6" font-size="9">.7</text>

      <!-- furry: 10G to sw-10g, currently powered off -->
      <path d="M 240,518 L 240,539 L 250,539" fill="none" stroke="#f2994a" stroke-width="2.5"/>
      <rect x="250" y="522" width="90" height="34" rx="8" fill="#1a1d24" stroke="#2a2e37"/>
      <text x="295" y="539" text-anchor="middle" fill="#e6e6e6" font-size="11">furry</text>
      <text x="295" y="551" text-anchor="middle" fill="#9aa0a6" font-size="9">.41 (off)</text>

      <line x1="195" y1="518" x2="195" y2="566" stroke="#5b6068" stroke-width="2"/>

      <rect x="50" y="566" width="190" height="34" rx="8" fill="#1a1d24" stroke="#2a2e37"/>
      <text x="145" y="587" text-anchor="middle" fill="#e6e6e6" font-size="12" font-weight="600">sw-desk · .11</text>

      <line x1="240" y1="583" x2="250" y2="583" stroke="#5b6068" stroke-width="2"/>
      <rect x="250" y="566" width="90" height="34" rx="8" fill="#1a1d24" stroke="#2a2e37"/>
      <text x="295" y="583" text-anchor="middle" fill="#e6e6e6" font-size="11">printer</text>
      <text x="295" y="595" text-anchor="middle" fill="#9aa0a6" font-size="9">.5</text>

      <!-- IoT cluster, wiring not fully resolved -->
      <rect x="50" y="618" width="290" height="42" rx="8" fill="#101319" stroke="#2a2e37" stroke-dasharray="3,3"/>
      <text x="195" y="634" text-anchor="middle" fill="#9aa0a6" font-size="11">hue-nyc · Sonos ×3 · Nighthawk AP</text>
      <text x="195" y="648" text-anchor="middle" fill="#5b6068" font-size="9">via sw-main's router-facing port — exact wiring TBD</text>

      <rect x="50" y="672" width="140" height="40" rx="8" fill="#1a1d24" stroke="#2a2e37"/>
      <text x="120" y="688" text-anchor="middle" fill="#e6e6e6" font-size="11">Camera NVR · .65</text>
      <text x="120" y="701" text-anchor="middle" fill="#9aa0a6" font-size="9">direct on router ether6</text>

      <rect x="200" y="672" width="140" height="40" rx="8" fill="#101319" stroke="#2a2e37" stroke-dasharray="3,3"/>
      <text x="270" y="692" text-anchor="middle" fill="#9aa0a6" font-size="11">nuc4</text>
      <text x="270" y="705" text-anchor="middle" fill="#5b6068" font-size="9.5">pending</text>

      <text x="195" y="736" text-anchor="middle" fill="#5b6068" font-size="10">Building WiFi (WAN2 backup) — planned, Milestone 7</text>

      <!-- Rambles site -->
      <rect x="640" y="330" width="330" height="260" rx="12" fill="#171a21" stroke="#2a2e37" stroke-width="1.5"/>
      <text x="805" y="356" text-anchor="middle" fill="#e6e6e6" font-size="16" font-weight="600">Rambles</text>
      <text x="805" y="374" text-anchor="middle" fill="#9aa0a6" font-size="11">LAN 10.0.2.0/24</text>

      <rect x="660" y="388" width="290" height="34" rx="8" fill="#1a1d24" stroke="#2a2e37"/>
      <text x="805" y="409" text-anchor="middle" fill="#e6e6e6" font-size="12.5" font-weight="600">rt-rambles — MikroTik RB5009 · .1</text>

      <!-- All four below connect directly to the router, not to each other -->
      <line x1="725" y1="422" x2="725" y2="436" stroke="#5b6068" stroke-width="2"/>
      <rect x="660" y="436" width="130" height="34" rx="8" fill="#101319" stroke="#2a2e37" stroke-dasharray="3,3"/>
      <text x="725" y="450" text-anchor="middle" fill="#9aa0a6" font-size="11">switch (CRS310)</text>
      <text x="725" y="462" text-anchor="middle" fill="#5b6068" font-size="8.5">mgmt IP unknown</text>

      <line x1="875" y1="422" x2="875" y2="436" stroke="#f2994a" stroke-width="2.5"/>
      <rect x="800" y="436" width="150" height="34" rx="8" fill="#1a1d24" stroke="#2a2e37"/>
      <text x="875" y="450" text-anchor="middle" fill="#e6e6e6" font-size="11">nuc5 (MS-01)</text>
      <text x="875" y="462" text-anchor="middle" fill="#9aa0a6" font-size="9">.10</text>

      <path d="M 700,422 L 645,422 L 645,501 L 660,501" fill="none" stroke="#5b6068" stroke-width="2"/>
      <rect x="660" y="484" width="90" height="34" rx="8" fill="#1a1d24" stroke="#2a2e37"/>
      <text x="705" y="498" text-anchor="middle" fill="#e6e6e6" font-size="10.5">kvm-nuc5</text>
      <text x="705" y="510" text-anchor="middle" fill="#9aa0a6" font-size="9">.226</text>

      <!-- ZenWiFi: main mesh node wired to router (per Bill); other 2 nodes backhaul wirelessly -->
      <path d="M 795,422 L 795,478 L 805,478 L 805,484" fill="none" stroke="#5b6068" stroke-width="2"/>
      <rect x="760" y="484" width="90" height="34" rx="8" fill="#1a1d24" stroke="#2a2e37"/>
      <text x="805" y="498" text-anchor="middle" fill="#e6e6e6" font-size="10.5">ZenWiFi AP</text>
      <text x="805" y="510" text-anchor="middle" fill="#9aa0a6" font-size="8">.251 (mesh×3)</text>

      <path d="M 910,422 L 965,422 L 965,501 L 950,501" fill="none" stroke="#5b6068" stroke-width="2"/>
      <rect x="860" y="484" width="90" height="34" rx="8" fill="#1a1d24" stroke="#2a2e37"/>
      <text x="905" y="498" text-anchor="middle" fill="#e6e6e6" font-size="10.5">hue-rambles</text>
      <text x="905" y="510" text-anchor="middle" fill="#9aa0a6" font-size="9">.244</text>

      <text x="805" y="540" text-anchor="middle" fill="#5b6068" font-size="10">Starlink (WAN2 backup) — planned, Milestone 6</text>

      <!-- Legend -->
      <line x1="30" y1="795" x2="55" y2="795" stroke="#5b6068" stroke-width="2"/>
      <text x="62" y="799" fill="#9aa0a6" font-size="11">1 Gbps link</text>

      <line x1="170" y1="795" x2="195" y2="795" stroke="#f2994a" stroke-width="2.5"/>
      <text x="202" y="799" fill="#9aa0a6" font-size="11">10 Gbps link</text>

      <line x1="330" y1="795" x2="355" y2="795" stroke="#4a90e2" stroke-width="1.5" stroke-dasharray="5,4"/>
      <text x="362" y="799" fill="#9aa0a6" font-size="11">WireGuard tunnel</text>

      <line x1="30" y1="819" x2="55" y2="819" stroke="#6fcf97" stroke-width="1.5" stroke-dasharray="2,4"/>
      <text x="62" y="823" fill="#9aa0a6" font-size="11">Site-to-site LAN route</text>

      <rect x="230" y="812" width="16" height="14" rx="3" fill="#101319" stroke="#2a2e37" stroke-dasharray="3,3"/>
      <text x="252" y="823" fill="#9aa0a6" font-size="11">Planned / unresolved wiring</text>
    </svg>
  </div>

</main>

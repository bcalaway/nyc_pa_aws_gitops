# WireGuard hub config — EC2 instance at 3.82.89.106
# Deployed to: /etc/wireguard/wg0.conf
# Managed by: wg-quick (systemctl enable --now wg-quick@wg0)
#
# PrivateKey stored in SSM: /home-platform/wireguard/server-private-key
# Replace PRIVATE_KEY_PLACEHOLDER before deploying.

[Interface]
Address = 10.0.3.1/24
ListenPort = 51820
PrivateKey = PRIVATE_KEY_PLACEHOLDER
PostUp   = iptables -A FORWARD -i wg0 -j ACCEPT; iptables -t nat -A POSTROUTING -o ens5 -j MASQUERADE
PostDown = iptables -D FORWARD -i wg0 -j ACCEPT; iptables -t nat -D POSTROUTING -o ens5 -j MASQUERADE

# NYC RB5009 — WireGuard: 10.0.3.2, LAN: 10.0.1.0/24
[Peer]
PublicKey = 1J/XgePFXCqj2VydcWjXoWvuEyo2IxWoBVOLH8u+xSM=
AllowedIPs = 10.0.3.2/32, 10.0.1.0/24

# Rambles RB5009 — WireGuard: 10.0.3.3, LAN: 10.0.2.0/24
[Peer]
PublicKey = R6r7wZoNa61LF6HjQHArrhv4AmEAbiX/9eml8fa2wU8=
